# ─────────────────────────────────────────────────────────────────────────────
# AUTO-UPDATE README — fetches each repo's README.md to build profile cards
# Save at: .github/workflows/update-readme.yml
# ─────────────────────────────────────────────────────────────────────────────
# What it does every day at 2am UTC:
#   1. Fetches all your public repos sorted by commit count
#   2. For each repo — downloads its actual README.md
#   3. Extracts: description, shields badges, status emoji, tech stack
#   4. Builds the projects table from real repo data — not hardcoded text
#   5. Commits the updated README back automatically
# ─────────────────────────────────────────────────────────────────────────────

name: Auto-Update README from Repos

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Fetch repos + parse READMEs + update profile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: cod-x-prince
        run: |
          python3 << 'PYEOF'
          import requests, os, re, base64, json

          USERNAME = os.environ["GITHUB_USERNAME"]
          TOKEN    = os.environ["GITHUB_TOKEN"]
          H        = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          # ── Repos to always pin (in this order if commits are equal) ────────
          PINNED_ORDER = [
              "gharam", "ozen", "xauusd-fetcher",
              "finance-roadmap", "geo-intel", "hemavision-ai",
          ]

          # ── Status overrides (repo_name → status string) ────────────────────
          STATUS = {
              "gharam":         "🔥 Shipping",
              "ozen":           "🔥 Building",
              "xauusd-fetcher": "🔧 Maintenance",
              "xauusd-v3":      "🔧 Maintenance",
              "finance-roadmap":"✅ Shipped",
              "geo-intel":      "🟡 Building",
              "hemavision-ai":  "🔬 Research",
              "rust-fetcher":   "🔧 Maintenance",
          }

          # ── Icon overrides ───────────────────────────────────────────────────
          ICON = {
              "gharam":         "🏠",
              "ozen":           "🌊",
              "xauusd-fetcher": "🦀",
              "xauusd-v3":      "⚡",
              "finance-roadmap":"📊",
              "geo-intel":      "🌍",
              "hemavision-ai":  "🧠",
          }

          # ── Fetch all public repos ───────────────────────────────────────────
          repos, page = [], 1
          while True:
              r = requests.get(
                  f"https://api.github.com/users/{USERNAME}/repos",
                  headers=H,
                  params={"per_page": 100, "page": page, "type": "owner"}
              )
              data = r.json()
              if not data or not isinstance(data, list): break
              repos.extend(data)
              page += 1

          # ── Get commit count ─────────────────────────────────────────────────
          def commit_count(name):
              r = requests.get(
                  f"https://api.github.com/repos/{USERNAME}/{name}/commits",
                  headers=H, params={"per_page": 1}
              )
              link = r.headers.get("Link", "")
              if 'rel="last"' in link:
                  return int([x.split(";")[0].strip("<>") for x in link.split(",") if 'rel="last"' in x][0].split("page=")[-1])
              body = r.json()
              return len(body) if isinstance(body, list) else 0

          # ── Fetch + parse repo README ────────────────────────────────────────
          def fetch_readme(name):
              r = requests.get(
                  f"https://api.github.com/repos/{USERNAME}/{name}/contents/README.md",
                  headers=H
              )
              if r.status_code != 200:
                  return ""
              content = r.json().get("content", "")
              try:
                  return base64.b64decode(content).decode("utf-8", errors="ignore")
              except Exception:
                  return ""

          def extract_first_paragraph(readme):
              """Extract first meaningful paragraph that isn't a heading or badge line."""
              lines = readme.splitlines()
              para = []
              for line in lines:
                  stripped = line.strip()
                  if not stripped: 
                      if para: break
                      continue
                  # Skip headings, badge lines, HTML image tags, shield links
                  if stripped.startswith("#"): continue
                  if "img.shields.io" in stripped: continue
                  if stripped.startswith("<img"): continue
                  if stripped.startswith("[!["): continue
                  if stripped.startswith("![") and "badge" in stripped.lower(): continue
                  if stripped.startswith("|"): continue
                  if stripped.startswith("<div"): continue
                  if stripped.startswith("<"): continue
                  para.append(stripped)
              return " ".join(para[:3]).strip()

          def extract_badges(readme):
              """Pull img.shields.io badge URLs from the README."""
              # Match markdown badge syntax: ![label](url)
              pattern = r'!\[([^\]]*)\]\((https://img\.shields\.io/badge/[^)]+)\)'
              matches = re.findall(pattern, readme)
              badges = []
              for label, url in matches[:4]:   # max 4 badges
                  # Clean up URL — ensure flat-square style
                  url = re.sub(r'style=[^&?]+', 'style=flat-square', url)
                  badges.append((label or url.split("/badge/")[1].split("-")[0], url))
              return badges

          def extract_language_badges(readme, repo_language):
              """Try to extract tech stack from README badges, fall back to repo language."""
              badges = extract_badges(readme)
              if badges:
                  return badges
              # Fallback: build one badge from the repo's primary language
              if repo_language:
                  lang = repo_language.replace(" ", "%20")
                  return [(repo_language, f"https://img.shields.io/badge/{lang}-555?style=flat-square")]
              return []

          def extract_status_emoji(readme):
              """Look for status keywords in the README."""
              lower = readme.lower()
              if any(w in lower for w in ["shipping", "deploying", "launching"]):
                  return "🔥 Shipping"
              if any(w in lower for w in ["wip", "building", "in progress", "development"]):
                  return "🟡 Building"
              if any(w in lower for w in ["stable", "production", "live", "released"]):
                  return "✅ Live"
              if any(w in lower for w in ["research", "experimental", "early"]):
                  return "🔬 Research"
              if any(w in lower for w in ["maintenance", "legacy", "archived"]):
                  return "🔧 Maintenance"
              return "🟢 Active"

          # ── Build repo data ──────────────────────────────────────────────────
          print("Fetching repo data...")
          repo_data = []
          for repo in repos:
              if repo["fork"] or repo["name"] == USERNAME: continue
              name    = repo["name"]
              commits = commit_count(name)
              readme  = fetch_readme(name)

              desc    = extract_first_paragraph(readme) or repo.get("description") or ""
              badges  = extract_language_badges(readme, repo.get("language"))
              status  = STATUS.get(name.lower()) or extract_status_emoji(readme)
              icon    = ICON.get(name.lower(), "📁")

              repo_data.append({
                  "name":    name,
                  "icon":    icon,
                  "desc":    desc[:220] + ("…" if len(desc) > 220 else ""),
                  "url":     repo["html_url"],
                  "stars":   repo["stargazers_count"],
                  "commits": commits,
                  "badges":  badges,
                  "status":  status,
                  "updated": repo["updated_at"][:10],
                  "lang":    repo.get("language") or "—",
              })
              print(f"  {commits:>4} commits — {name}")

          # Sort: pinned first (by PINNED_ORDER), then rest by commits
          def sort_key(r):
              name = r["name"].lower()
              if name in PINNED_ORDER:
                  return (0, PINNED_ORDER.index(name))
              return (1, -r["commits"])

          repo_data.sort(key=sort_key)
          top6 = repo_data[:6]

          # ── Build HTML table ─────────────────────────────────────────────────
          def build_badge_html(badges):
              html = ""
              for label, url in badges:
                  html += f'        <img src="{url}" alt="{label}"/>\n'
              return html

          rows_html = ""
          for i in range(0, len(top6), 2):
              rows_html += "  <tr>\n"
              for repo in top6[i:i+2]:
                  badge_html = build_badge_html(repo["badges"])
                  icon    = repo["icon"]
                  rurl    = repo["url"]
                  rname   = repo["name"]
                  rdesc   = repo["desc"]
                  commits = repo["commits"]
                  status  = repo["status"]
                  td  = "    <td width=\"50%\" valign=\"top\">\n"
                  td += f"      <h3>{icon} <a href=\"{rurl}\">{rname}</a></h3>\n"
                  td += f"      <p>{rdesc}</p>\n"
                  td += "      <p>\n"
                  td += badge_html
                  td += "      </p>\n"
                  td += f"      <img src=\"https://img.shields.io/badge/commits-{commits}-238636?style=flat-square\"  />\n"
                  td += "      &nbsp;\n"
                  td += f"      <img src=\"https://img.shields.io/github/stars/{USERNAME}/{rname}?style=flat-square&color=58A6FF\" />\n"
                  td += f"      &nbsp; {status}\n"
                  td += "    </td>\n"
                  rows_html += td
              rows_html += "  </tr>\n"

          new_block = (
              "<!-- AUTO-PROJECTS:START -->\n"
              "<table>\n"
              + rows_html +
              "</table>\n"
              "<!-- AUTO-PROJECTS:END -->"
          )

          # ── Inject into README ───────────────────────────────────────────────
          with open("README.md") as f:
              readme_profile = f.read()

          pattern = r'<!-- AUTO-PROJECTS:START -->.*?<!-- AUTO-PROJECTS:END -->'
          if re.search(pattern, readme_profile, re.DOTALL):
              updated = re.sub(pattern, new_block, readme_profile, flags=re.DOTALL)
              with open("README.md", "w") as f:
                  f.write(updated)
              print("\n✅ README updated successfully.")
          else:
              print("\n⚠️  AUTO-PROJECTS markers not found in README.")
              print("    Add these around your projects table:")
              print("    <!-- AUTO-PROJECTS:START -->")
              print("    <!-- AUTO-PROJECTS:END -->")
          PYEOF

      - name: Generate WakaTime stats SVG
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: |
          python3 << 'WEOF'
          import requests, json, os, math

          KEY = os.environ.get("WAKATIME_API_KEY", "")
          if not KEY:
              print("No WAKATIME_API_KEY secret set — skipping SVG generation")
              exit(0)

          # Fetch last 7 days stats
          r = requests.get(
              "https://wakatime.com/api/v1/users/current/stats/last_7_days",
              headers={"Authorization": f"Basic {__import__('base64').b64encode(KEY.encode()).decode()}"}
          )
          if r.status_code != 200:
              print(f"WakaTime API error: {r.status_code}")
              exit(0)

          data = r.json().get("data", {})
          total      = data.get("human_readable_total", "N/A")
          daily_avg  = data.get("human_readable_daily_average", "N/A")
          languages  = data.get("languages", [])[:8]
          top_proj   = (data.get("projects") or [{}])[0].get("name", "—")

          LANG_COLORS = {
              "TypeScript":"#3178c6","JavaScript":"#f7df1e","Python":"#3572A5",
              "Rust":"#dea584","Bash":"#89e051","Markdown":"#083fa1",
              "JSON":"#c8a96e","CSS":"#563d7c","HTML":"#e34c26",
              "Prisma":"#0c3249","YAML":"#cb171e","Other":"#8b949e",
          }

          # Build SVG
          W, PH = 500, 28
          bar_area_w = 260
          rows_h = len(languages) * PH
          total_h = 130 + rows_h

          def color(lang):
              return LANG_COLORS.get(lang, "#58a6ff")

          rows_svg = ""
          for i, lang in enumerate(languages):
              y      = 120 + i * PH
              name   = lang.get("name","?")
              pct    = lang.get("percent", 0)
              htime  = lang.get("text", "")
              bar_w  = max(4, int(bar_area_w * pct / 100))
              c      = color(name)
              rows_svg += f"""
            <text x="20" y="{y+17}" fill="#8b949e" font-size="12" font-family="monospace">{name}</text>
            <rect x="130" y="{y+6}" width="{bar_w}" height="12" rx="3" fill="{c}" opacity="0.85"/>
            <text x="{130+bar_w+8}" y="{y+17}" fill="#8b949e" font-size="11" font-family="monospace">{htime}  ({pct:.1f}%)</text>"""

          svg = f"""<svg width="{W}" height="{total_h}" xmlns="http://www.w3.org/2000/svg">
            <rect width="{W}" height="{total_h}" rx="10" fill="#0d1117"/>
            <rect width="{W}" height="{total_h}" rx="10" fill="none" stroke="#30363d" stroke-width="1"/>

            <!-- Header -->
            <text x="20" y="32" fill="#58a6ff" font-size="15" font-weight="bold" font-family="monospace">⏱ Last 7 Days — WakaTime</text>
            <line x1="20" y1="42" x2="{W-20}" y2="42" stroke="#21262d" stroke-width="1"/>

            <!-- Stats row -->
            <text x="20" y="65" fill="#8b949e" font-size="11" font-family="monospace">TOTAL</text>
            <text x="20" y="84" fill="#f0f6fc" font-size="20" font-weight="bold" font-family="monospace">{total}</text>

            <text x="260" y="65" fill="#8b949e" font-size="11" font-family="monospace">DAILY AVG</text>
            <text x="260" y="84" fill="#f0f6fc" font-size="20" font-weight="bold" font-family="monospace">{daily_avg}</text>

            <line x1="20" y1="100" x2="{W-20}" y2="100" stroke="#21262d" stroke-width="1"/>
            <text x="20" y="116" fill="#8b949e" font-size="11" font-family="monospace">LANGUAGES</text>

            <!-- Language rows -->
            {rows_svg}

            <!-- Footer -->
            <text x="{W-20}" y="{total_h-10}" fill="#30363d" font-size="10" font-family="monospace" text-anchor="end">wakatime.com/@codxprince</text>
          </svg>"""

          with open("wakatime-stats.svg", "w") as f:
              f.write(svg)
          print(f"✅ SVG generated — {total} total, {len(languages)} languages")
          WEOF

      - name: Commit if changed

        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md wakatime-stats.svg
          git diff --staged --quiet \
            && echo "No changes to commit." \
            || (git commit -m "chore: auto-update projects from repo READMEs [skip ci]" && git push)
